name: User Service CI/CD

on:
  push:
    paths:
      - 'user_service/**'
  pull_request:
    paths:
      - 'user_service/**'

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: user_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: secret
        ports: ['5432:5432']
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          cd user_service
          pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          cd user_service
          flake8 . --count --max-line-length=120 --statistics

      - name: Run tests
        env:
          DATABASE_URL: postgres://postgres:secret@localhost:5432/user_db
          SECRET_KEY: test-secret-key
          DEBUG: "True"
        run: |
          cd user_service
          pytest --ds=user_service.settings -v

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/user-service:${{ github.sha }} user_service/

      - name: Login to Docker Hub
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Docker image
        if: github.ref == 'refs/heads/main'
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/user-service:${{ github.sha }}
